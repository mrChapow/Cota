<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuego Cota // Archive 001</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root { 
            --accent: #000000;
            --bg: #ffffff;
            --secondary: #666666;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: var(--accent);
            font-family: "Inter", -apple-system, sans-serif;
            overflow: hidden;
            letter-spacing: -0.02em;
        }

        /* BACKGROUND LAYERS */
        #root {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #f5f5f5 0%, #ffffff 70%);
            z-index: 1;
        }

        .grain-overlay {
            position: fixed;
            inset: 0;
            opacity: 0.05;
            pointer-events: none;
            z-index: 2;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* THE 3D MODEL */
        model-viewer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            --poster-color: transparent;
            exposure: 1.2;
            z-index: 3;
        }

        /* HEADER STACK */
        .header-container {
            position: fixed;
            top: 40px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 9999;
            pointer-events: none;
        }

        .brand-id {
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            pointer-events: auto;
        }

        .top-nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            pointer-events: auto;
        }

        .nav-link {
            color: var(--secondary);
            text-decoration: none;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: color 0.3s ease;
        }

        .nav-link.active, .nav-link:hover { color: var(--accent); }

        /* INTERFACE */
        .interface {
            position: fixed;
            inset: 0;
            padding: 40px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            z-index: 100;
        }

        .bottom-ui {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: auto;
        }

        .product-info { max-width: 380px; }

        .product-title {
            font-size: 32px;
            font-weight: 300;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        .product-description {
            font-size: 12px;
            line-height: 1.6;
            color: var(--secondary);
            margin: 0;
        }

        .price {
            display: block;
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .cta-button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 18px 48px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }
        
        .cta-button:hover {
            opacity: 0.8;
        }

        /* MOBILE ADJUSTMENTS */
        @media (max-width: 768px) {
            .header-container { top: 30px; gap: 12px; }
            .brand-id { font-size: 11px; }
            .top-nav { gap: 15px; }
            .nav-link { font-size: 8px; letter-spacing: 0.1em; }
            .interface { padding: 25px; }
            .bottom-ui { flex-direction: column; align-items: flex-start; }
            .product-info { margin-bottom: 25px; }
            .product-title { font-size: 24px; }
            .purchase-zone { width: 100%; text-align: left; }
            .cta-button { width: 100%; padding: 16px; }
            model-viewer { height: 80%; top: 10%; }
        }
    </style>
</head>
<body>

    <div id="root">
        <div class="grain-overlay"></div>

        <header class="header-container">
            <div class="brand-id">FUEGO COTA // LAB</div>
            <nav class="top-nav">
                <a href="#" class="nav-link">Home</a>
                <a href="#" class="nav-link active">Archive</a>
                <a href="#" class="nav-link">Process</a>
            </nav>
        </header>

        <model-viewer 
            src="mockup-Cota-w3sl-tshirt.glb" 
            alt="Cota Lab W3SL T-Shirt"
            auto-rotate 
            camera-controls
            disable-zoom
            disable-pan
            shadow-intensity="1.5" 
            shadow-softness="1"
            camera-orbit="0deg 75deg 105%"
            min-camera-orbit="auto 75deg auto"
            max-camera-orbit="auto 75deg auto"
            touch-action="none">
        </model-viewer>

        <div class="interface">
            <div class="bottom-ui">
                <div class="product-info">
                    <h1 class="product-title">W3SL T-Shirt</h1>
                    <p class="product-description">
                        Heavyweight cotton tee, screen-printed by hand using water-based inks. This release operates on a pre-order model to directly fund the independent Cota print shop. Edition limited to archive availability.
                    </p>
                </div>

                <div class="purchase-zone">
                    <span class="price">$40.00</span>
                    <button class="cta-button">Pre-Order</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
